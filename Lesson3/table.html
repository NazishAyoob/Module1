<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table Activity</title>
</head>
<body>

    <h1>Table Activity</h1>

    <h2>1. Simple Student Table</h2>

    <table border="1" cellpadding="10">
        <tr>
            <th>Name</th>
            <th>Class</th>
            <th>Marks</th>
        </tr>
        <tr>
            <td>Ali</td>
            <td>6</td>
            <td>87</td>
        </tr>
        <tr>
            <td>Sara</td>
            <td>7</td>
            <td>92</td>
        </tr>
        <tr>
            <td>John</td>
            <td>5</td>
            <td>78</td>
        </tr>
    </table>

    <br><br>

    <h2>2. Product Price Table</h2>
    <table border="1" cellpadding="10">
        <tr>
            <th>Product</th>
            <th>Price</th>
            <th>Stock</th>
        </tr>
        <tr>
            <td>Notebook</td>
            <td>$2</td>
            <td>Available</td>
        </tr>
        <tr>
            <td>Pencil</td>
            <td>$1</td>
            <td>Out of Stock</td>
        </tr>
        <tr>
            <td>Bag</td>
            <td>$15</td>
            <td>Available</td>
        </tr>
    </table>

</body>
</html>
